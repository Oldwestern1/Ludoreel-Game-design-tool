<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Prompt Roulette</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --panel-light: #2a2a2a;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent: #ff6b6b;
            --accent-hover: #ff5252;
            --border-radius: 12px;
            --mechanics: #ff8787;
            --themes: #4dadf7;
            --components: #a78bfa;
            --border-color: #444;
            --border-color-soft: #333;
            --row-bg-active: rgba(255,255,255,0.04);
            --row-bg-hover: #252525;
            --lock-empty: #3a3a3a;
            --lock-hover: #666;
        }
        body.light-mode {
            --bg-color: #f4f1ea;
            --panel-bg: #ffffff;
            --panel-light: #ece7da;
            --text-main: #2b2620;
            --text-muted: #7a7468;
            --accent: #d9483a;
            --accent-hover: #c23b2e;
            --mechanics: #e0625a;
            --themes: #3a7bbf;
            --components: #8a6fc9;
            --border-color: #d6cfbe;
            --border-color-soft: #e2dbca;
            --row-bg-active: rgba(0,0,0,0.03);
            --row-bg-hover: #e9e2d0;
            --lock-empty: #cabfa8;
            --lock-hover: #a89a7c;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            transition: background-color 0.25s ease, color 0.25s ease;
            position: relative;
        }

        .wallpaper-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-repeat: repeat;
            opacity: 0;
            transition: opacity 0.3s ease;
            -webkit-mask-image: radial-gradient(ellipse 85% 75% at center, transparent 40%, black 70%);
            mask-image: radial-gradient(ellipse 85% 75% at center, transparent 40%, black 70%);
        }
        .wallpaper-layer.visible { opacity: 1; }
        .page { position: relative; z-index: 1; flex: 1; min-width: 0; padding: 2.5rem 2rem 3rem; display: flex; flex-direction: column; align-items: center; }

        .mode-toggle {
            position: fixed; top: 1rem; right: 1rem; z-index: 5; width: 44px; height: 44px;
            border-radius: 50%; background: var(--panel-bg); color: var(--text-main); border: 1px solid var(--border-color);
            cursor: pointer; font-size: 1.4rem; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25); transition: background 0.2s, transform 0.15s, color 0.2s;
        }
        .mode-toggle:hover { transform: scale(1.08); }

        .wallpaper-style-btn {
            position: fixed; bottom: 0.85rem; right: 0.85rem; z-index: 5; width: 30px; height: 30px;
            border-radius: 50%; background: transparent; color: var(--text-muted); border: none;
            cursor: pointer; font-size: 3rem; opacity: 0.3; display: flex; align-items: center; justify-content: center;
            transition: opacity 0.2s, transform 0.2s, color 0.2s;
            user-select: none; -webkit-user-select: none;
        }
        .wallpaper-style-btn:hover { opacity: 0.9; color: var(--accent); transform: rotate(15deg) scale(1.15); }
        .wallpaper-style-btn.long-pressing {
            opacity: 1; color: var(--accent); transform: scale(1.3);
            transition: opacity 0.1s, transform 0.1s, color 0.1s;
        }

        /* Long-press progress ring */
        .wallpaper-btn-wrap {
            position: fixed; bottom: 0.25rem; right: 0.25rem; z-index: 5;
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
        }
        .wallpaper-progress-ring {
            position: absolute; inset: 0; pointer-events: none;
        }
        .wallpaper-progress-ring circle {
            fill: none;
            stroke: var(--accent);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-dasharray: 138.23; /* 2π × 22 */
            stroke-dashoffset: 138.23;
            transform-origin: center;
            transform: rotate(-90deg);
            transition: stroke-dashoffset 0.05s linear;
            opacity: 0;
        }
        .wallpaper-progress-ring.active circle { opacity: 0.8; }

        .header-block { width: 100%; max-width: 1100px; text-align: center; margin-bottom: 2rem; }
        .title-row { display: flex; align-items: center; justify-content: center; gap: 0.9rem; }
        .die { font-size: 4.8rem; color: var(--accent); }
        h1 { color: var(--accent); margin: 0; text-transform: uppercase; letter-spacing: 2px; font-size: 3rem; }
        .title-rule { margin-top: 0.9rem; font-family: monospace; color: var(--accent); opacity: 0.7; font-size: 1.1rem; font-weight: bold; overflow: hidden; white-space: nowrap; }

        .container { display: flex; flex-direction: column; gap: 2rem; max-width: 1100px; width: 100%; }
        @media (min-width: 768px) { .container { flex-direction: row; align-items: flex-start; } }
        .left-column { flex: 1; display: flex; flex-direction: column; gap: 1.5rem; min-width: 340px; }
        .settings-panel { background-color: var(--panel-bg); padding: 1.5rem; border-radius: var(--border-radius); box-shadow: 0 8px 16px rgba(0,0,0,0.3); }
        .settings-panel h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 2px solid var(--border-color-soft); padding-bottom: 0.5rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        
        .setting-row { margin-bottom: 1rem; display: flex; flex-direction: column; gap: 6px; background: var(--panel-light); padding: 12px; border-radius: 8px; border-left: 4px solid var(--border-color); transition: all 0.2s ease; }
        .setting-row.active { border-left-color: var(--row-color, var(--accent)); background: var(--row-bg-active); }
        .setting-row:not(.active) { opacity: 0.35; }
        .setting-row:not(.active) .cat-check:checked { background-color: var(--text-muted); border-color: var(--text-muted); }
        .setting-row:not(.active) .cat-check.indeterminate { border-color: var(--text-muted); }
        #row-themes { --row-color: var(--themes); }
        #row-mechanics { --row-color: var(--mechanics); }
        #row-components { --row-color: var(--components); }
        .setting-row:not(.active) .pool-toggle, .setting-row:not(.active) .pool-wrapper { pointer-events: none; }

        .setting-control { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .control-left { display: flex; align-items: center; gap: 10px; }
        .setting-control label { user-select: none; font-size: 1.3rem; font-weight: bold; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border-color); transition: .3s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }
        .number-input { width: 50px; padding: 6px; background: var(--panel-light); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 4px; text-align: center; font-size: 1rem; }
        
        .pool-meta { font-family: monospace; font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.5px; }
        .pool-meta.warn { color: var(--accent); }
        .pool-toggle { background: none; border: none; color: var(--text-muted); cursor: pointer; text-align: left; font-size: 0.8rem; padding: 2px 0; text-transform: uppercase; letter-spacing: 1px; display: inline-flex; align-items: center; gap: 5px; width: fit-content; margin-top: 4px; }
        .pool-toggle:hover { color: var(--accent); }
        .pool-wrapper { display: none; background: var(--panel-light); border-radius: 6px; padding: 10px; margin-top: 5px; border: 1px solid var(--border-color-soft); }
        .pool-wrapper.open { display: block; }
        .pool-search { width: 100%; padding: 6px; background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 4px; margin-bottom: 8px; box-sizing: border-box; }
        
        .pool-category { margin-bottom: 6px; border: 1px solid var(--border-color-soft); border-radius: 6px; background: var(--row-bg-active); overflow: hidden; }
        .pool-category summary { padding: 6px 10px; background: var(--panel-bg); font-weight: bold; font-size: 0.75rem; cursor: pointer; user-select: none; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; outline: none; transition: background 0.2s, color 0.2s; display: flex; align-items: center; gap: 8px; }
        .pool-category summary:hover { color: var(--accent); background: var(--row-bg-hover); }
        .pool-category[open] summary { border-bottom: 1px solid var(--border-color-soft); color: var(--accent); }
        .summary-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .pool-category .cat-count { color: var(--text-muted); font-weight: normal; flex-shrink: 0; }
        
        .cat-check { -webkit-appearance: none; appearance: none; width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--text-muted); background: transparent; flex-shrink: 0; cursor: pointer; display: inline-block; position: relative; margin: 0; padding: 0; transition: border-color 0.15s, background-color 0.15s; }
        .cat-check:hover { border-color: var(--accent); }
        .cat-check:checked { background-color: var(--accent); border-color: var(--accent); }
        .cat-check.indeterminate { background-color: transparent; border-color: var(--accent); }
        
        .pool-content { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; max-height: 180px; overflow-y: auto; padding: 8px; }
        .pool-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--text-main); }
        .pool-item label { cursor: pointer; width: 100%; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        .pool-item input[type=checkbox] { -webkit-appearance: none; appearance: none; width: 11px; height: 11px; border-radius: 50%; border: 2px solid var(--text-muted); background: transparent; flex-shrink: 0; cursor: pointer; margin: 0; padding: 0; transition: border-color 0.15s, background-color 0.15s; }
        .pool-item input[type=checkbox]:hover { border-color: var(--accent); }
        .pool-item input[type=checkbox]:checked { background-color: var(--accent); border-color: var(--accent); }

        .btn-spin { background-color: var(--accent); color: white; border: none; padding: 1.2rem; font-size: 1.3rem; font-weight: bold; border-radius: var(--border-radius); cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 5px 0 #cc0000; width: 100%; }
        .btn-spin:active { transform: translateY(5px); box-shadow: 0 0 0 #cc0000; }
        .btn-spin:disabled { background-color: var(--text-muted); box-shadow: 0 5px 0 var(--border-color-soft); cursor: not-allowed; transform: none; opacity: 0.6; }
        .spin-error { color: var(--accent); font-size: 0.85rem; text-align: center; margin-top: -0.5rem; min-height: 1.2em; }

        .randomizer-panel { flex: 2; display: flex; flex-direction: column; gap: 1.5rem; min-width: 0; }
        .results-stack { display: flex; flex-direction: column; gap: 1rem; }
        .result-card { background-color: var(--panel-bg); border-radius: var(--border-radius); border-left: 5px solid var(--c); box-shadow: 0 4px 10px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 0.9rem; padding: 1rem 1.2rem; min-height: 50px; opacity: 0; position: relative; overflow: hidden; animation: cardPopIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes cardPopIn { 0% { opacity: 0; transform: scale(0.8) translateY(30px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        .result-card.mechanic-card { --c: var(--mechanics); }
        .result-card.theme-card { --c: var(--themes); }
        .result-card.component-card { --c: var(--components); }

        .lock-btn { font-size: 2.8rem; line-height: 1; width: 1.8rem; flex-shrink: 0; text-align: center; background: none; border: none; color: var(--lock-empty); cursor: pointer; padding: 0; transition: color 0.15s, transform 0.15s; }
        .lock-btn:hover { color: var(--lock-hover); transform: scale(1.08); }
        .lock-btn.locked { color: var(--accent); }
        .lock-btn.locked:hover { color: var(--accent-hover); }

        .card-info { display: flex; flex-direction: column; flex: 1; min-width: 0; }
        .result-title { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.2rem; }
        .result-value { font-size: 1.2rem; font-weight: bold; line-height: 1.2; display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
        .card-watermark { position: absolute; color: var(--text-muted); opacity: 0.18; line-height: 1; user-select: none; pointer-events: none; white-space: nowrap; z-index: 0; }
        .lock-btn, .card-info, .btn-reroll { position: relative; z-index: 1; }

        .btn-reroll { background: var(--panel-light); border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 50%; width: 38px; height: 38px; min-width: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); padding: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.15); font-size: 1.2rem; }
        .btn-reroll:hover { color: var(--c); border-color: var(--c); transform: scale(1.08); }
        .btn-reroll:active { transform: rotate(180deg) scale(1.08); }
        .btn-reroll:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }

        .prompt-container { background-color: var(--panel-light); border-radius: var(--border-radius); padding: 1.5rem; border: 1px solid var(--border-color); box-shadow: inset 0 2px 4px rgba(0,0,0,0.25); margin-top: 1rem; }
        .prompt-container h3 { margin-top: 0; color: var(--accent); font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.8rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
        .prompt-text { font-size: 1.2rem; line-height: 1.6; color: var(--text-main); }
        .highlight { color: var(--accent); font-weight: bold; }

        .copy-btn { background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); padding: 0.45rem 0.85rem; border-radius: 8px; font-size: 0.75rem; letter-spacing: 0.5px; text-transform: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0; transition: color 0.15s, border-color 0.15s; }
        .copy-btn:hover { color: var(--text-main); border-color: var(--accent); }
        .copy-btn.copied { color: #6dd58c; border-color: #6dd58c; }
    </style>
</head>
<body>
    <div class="wallpaper-layer" id="wallpaperLayer" aria-hidden="true"></div>
    <button class="mode-toggle" id="modeToggle" aria-label="Switch between light and dark mode" title="Switch theme">&#9818;</button>

    <div class="page">
        <div class="header-block">
            <div class="title-row">
                <span class="die" aria-hidden="true">&#9858;</span>
                <h1 id="appTitle">Game Prompt Roulette</h1>
                <span class="die" aria-hidden="true">&#9860;</span>
            </div>
            <div class="title-rule" aria-hidden="true">⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯</div>
        </div>

        <div class="container">
            <div class="left-column">
                <div class="settings-panel">
                    <h2>Randomizer</h2>

                    <div class="setting-row active" id="row-themes">
                        <div class="setting-control">
                            <div class="control-left">
                                <input type="number" id="numThemes" class="number-input" value="2" min="1" max="4">
                                <label>Themes</label>
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="toggle-themes" checked onchange="updateRowState('themes')">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <button class="pool-toggle" data-target="pool-wrapper-themes">[+] Show pool</button>
                        <div id="pool-wrapper-themes" class="pool-wrapper">
                            <input type="text" class="pool-search" placeholder="Search themes..." oninput="filterPool(this)">
                            <div id="pool-themes"></div>
                            <div class="pool-meta" id="pool-meta-themes"></div>
                        </div>
                    </div>

                    <div class="setting-row active" id="row-mechanics">
                        <div class="setting-control">
                            <div class="control-left">
                                <input type="number" id="numMechanics" class="number-input" value="2" min="1" max="6">
                                <label>Mechanics</label>
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="toggle-mechanics" checked onchange="updateRowState('mechanics')">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <button class="pool-toggle" data-target="pool-wrapper-mechanics">[+] Show pool</button>
                        <div id="pool-wrapper-mechanics" class="pool-wrapper">
                            <input type="text" class="pool-search" placeholder="Search mechanics..." oninput="filterPool(this)">
                            <div id="pool-mechanics"></div>
                            <div class="pool-meta" id="pool-meta-mechanics"></div>
                        </div>
                    </div>

                    <div class="setting-row active" id="row-components">
                        <div class="setting-control">
                            <div class="control-left">
                                <input type="number" id="numComponents" class="number-input" value="2" min="1" max="6">
                                <label>Components</label>
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="toggle-components" checked onchange="updateRowState('components')">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <button class="pool-toggle" data-target="pool-wrapper-components">[+] Show pool</button>
                        <div id="pool-wrapper-components" class="pool-wrapper">
                            <input type="text" class="pool-search" placeholder="Search components..." oninput="filterPool(this)">
                            <div id="pool-components"></div>
                            <div class="pool-meta" id="pool-meta-components"></div>
                        </div>
                    </div>
                </div>
                <div class="spin-error" id="spinError"></div>
                <button class="btn-spin" id="spinBtn" onclick="startSpin()">Hit Me!</button>
            </div>

            <div class="randomizer-panel">
                <div class="results-stack" id="resultsContainer"></div>
                <div class="prompt-container" id="promptBox" style="display: none;">
                    <h3>
                        <span>Generated Prompt</span>
                        <button class="copy-btn" id="copyBtn" onclick="copyPrompt()">Copy prompt</button>
                    </h3>
                    <div class="prompt-text" id="finalPrompt"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="wallpaper-btn-wrap">
        <svg class="wallpaper-progress-ring" id="wallpaperProgressRing" viewBox="0 0 48 48">
            <circle cx="24" cy="24" r="22"/>
        </svg>
        <button class="wallpaper-style-btn" id="wallpaperStyleBtn" aria-label="Cycle background style" title="Cycle background style">&#9830;</button>
    </div>

    <script>

        function hashString(str) {
            let h = 0;
            for (let i = 0; i < str.length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
            return Math.abs(h);
        }

        function seededValues(seed, count) {
            let s = seed % 2147483647;
            if (s <= 0) s += 2147483646;
            const out = [];
            for (let i = 0; i < count; i++) {
                s = (s * 16807) % 2147483647;
                out.push((s - 1) / 2147483646);
            }
            return out;
        }

       function getWatermarkFor(categoryKey, subIndex, itemName) {
    const seed = hashString(`${categoryKey}:${subIndex}:${itemName}`);
    const [rGlyph, rLeft, rTop, rSize, rRotation, rVAnchor] = seededValues(seed, 6);
    const glyph = WATERMARK_GLYPHS[Math.floor(rGlyph * WATERMARK_GLYPHS.length)];
    const baseScale = WATERMARK_SCALE[glyph] || 1.0;
    const sizeMultiplier = 1.1; 
    const scale = baseScale * sizeMultiplier;
    const left = 12 + rLeft * 76;
    const rotation = Math.round((rRotation - 0.5) * 50);
    // vAnchor and vOffset keep the watermark peeking within the card edges
    const vAnchor = rVAnchor < 0.5 ? 'top' : 'bottom';
    const vOffset = -0.5 + rTop * 0.8; // small positive/negative so glyph clips nicely at edge
    
    return { glyph, scale, rotation, left, vAnchor, vOffset };
}

        function getCategoryContentEl(key, category) {
            const container = document.getElementById(`pool-${key}`);
            if (!container) return null;
            const contents = container.querySelectorAll('.pool-content');
            for (const el of contents) if (el.dataset.category === category) return el;
            return null;
        }

        function setCategoryChecked(key, category, checked) {
            const scope = getCategoryContentEl(key, category);
            if (!scope) return;
            scope.querySelectorAll('input[type=checkbox]').forEach(cb => { cb.checked = checked; });
            updateCategoryCheckState(key, category); updatePoolMeta(key); updateSpinAvailability();
        }

        function updateCategoryCheckState(key, category) {
            const scope = getCategoryContentEl(key, category);
            if (!scope) return;
            const boxes = Array.from(scope.querySelectorAll('input[type=checkbox]'));
            const checkedCount = boxes.filter(cb => cb.checked).length;
            const catCheck = scope.closest('.pool-category').querySelector('.cat-check');
            if (checkedCount === 0) { catCheck.checked = false; catCheck.classList.remove('indeterminate'); catCheck.indeterminate = false; } 
            else if (checkedCount === boxes.length) { catCheck.checked = true; catCheck.classList.remove('indeterminate'); catCheck.indeterminate = false; } 
            else { catCheck.checked = false; catCheck.classList.add('indeterminate'); catCheck.indeterminate = true; }
        }

        function onPoolItemChange(key, category) {
            if (category) updateCategoryCheckState(key, category);
            updatePoolMeta(key); updateSpinAvailability();

        function updatePoolMeta(key) {
            const meta = document.getElementById(`pool-meta-${key}`);
            if (!meta) return;
            const total = document.querySelectorAll(`#pool-${key} input[type=checkbox]:not(.cat-check)`).length;
            const checked = document.querySelectorAll(`#pool-${key} input[type=checkbox]:not(.cat-check):checked`).length;
            if (checked === 0) { meta.textContent = `0 of ${total} selected — turn at least one on to draw from this pool`; meta.classList.add('warn'); } 
            else { meta.textContent = `${checked} of ${total} selected`; meta.classList.remove('warn'); }

        function filterPool(inputElement) {
            const query = inputElement.value.toLowerCase();
            const poolWrapper = inputElement.parentElement;
            const categories = poolWrapper.querySelectorAll('.pool-category');
            const poolContainer = poolWrapper.querySelector('[id^="pool-"]');
            if (poolContainer) poolContainer.dataset.suppressAccordion = 'true';

            categories.forEach(cat => {
                let hasVisibleItem = false;
                const items = cat.querySelectorAll('.pool-item');
                items.forEach(item => {
                    if (item.textContent.toLowerCase().includes(query)) { item.style.display = 'flex'; hasVisibleItem = true; } 
                    else { item.style.display = 'none'; }
                });
                if (query !== "") { cat.style.display = hasVisibleItem ? 'block' : 'none'; if (hasVisibleItem) cat.open = true; } 
                else { cat.style.display = 'block'; cat.open = false; }
            });
            if (poolContainer) poolContainer.dataset.suppressAccordion = 'false';
        }

        function getRandomItemWithoutDupes(pool, currentSelections) {
            const trackingNames = currentSelections.map(s => s.name);
            const filteredPool = pool.filter(name => !trackingNames.includes(name));
            if (filteredPool.length === 0) return null;
            return filteredPool[Math.floor(Math.random() * filteredPool.length)];

        function clampNumberInputs() {
            sectionKeys.forEach(key => {
                const input = document.getElementById(`num${key.charAt(0).toUpperCase() + key.slice(1)}`);
                const max = parseInt(input.getAttribute('max'), 10);
                const min = parseInt(input.getAttribute('min'), 10);
                const poolSize = Math.max(getFilteredPool(key).length, 0);
                const effectiveMax = poolSize > 0 ? Math.min(max, poolSize) : max;
                let val = parseInt(input.value, 10);
                if (isNaN(val)) val = min;
                input.value = Math.min(Math.max(val, min), effectiveMax || min);
            });
        }

        function updateSpinAvailability() {
            const errorEl = document.getElementById('spinError');
            const spinBtn = document.getElementById('spinBtn');
            const anyEnabled = sectionKeys.some(k => enabledSections[k]);

            if (!anyEnabled) { errorEl.textContent = 'Turn on at least one category to spin.'; spinBtn.disabled = true; return; }
            const emptyPools = sectionKeys.filter(k => enabledSections[k] && getFilteredPool(k).length === 0);
            if (emptyPools.length > 0) { errorEl.textContent = `Select at least one item in: ${emptyPools.join(', ')}.`; spinBtn.disabled = true; return; }
            errorEl.textContent = ''; spinBtn.disabled = false;

        function doRouletteSpin(valueNode, pool, finalItemData, categoryKey) {
            return new Promise(resolve => {
                let ticks = 0; const maxTicks = 20 + Math.floor(Math.random() * 10); let delay = 15;
                valueNode.style.opacity = '0.5';
                function nextTick() {
                    ticks++;
                    if (ticks >= maxTicks) {
                        valueNode.textContent = categoryKey === 'components' ? (finalItemData.rule === 'use' ? 'Use ' : 'Without ') + finalItemData.name : finalItemData.name;
                        valueNode.style.opacity = '1';
                        resolve(); return;
                    }
                    const randomItem = pool[Math.floor(Math.random() * pool.length)];
                    const tempRule = Math.random() < 0.5 ? 'use' : 'without';
                    valueNode.textContent = categoryKey === 'components' ? (tempRule === 'use' ? 'Use ' : 'Without ') + randomItem : randomItem;
                    delay *= 1.1; setTimeout(nextTick, delay);
                }
                nextTick();
            });
        }

            rerollBtn.disabled = isLocked;

        async function renderAllCards(isFullSpin) {
            const container = document.getElementById('resultsContainer');
            let expectedCount = 0; sectionKeys.forEach(key => { if (enabledSections[key]) expectedCount += currentResults[key].length; });
            container.innerHTML = ''; if (expectedCount === 0) return;

            let globalIndex = 0;
            sectionKeys.forEach(key => {
                if (enabledSections[key]) {
                    currentResults[key].forEach((item, i) => {
                        const willSpin = isFullSpin && !lockedState[key][i];
                        const label = key.charAt(0).toUpperCase() + key.slice(1, -1); // "Theme", "Mechanic", "Component"
                        container.appendChild(createCardNode(label + ' ' + (i + 1), item, key, i, willSpin, globalIndex));
                        globalIndex++;
                    });
                }
            });

            const spinPromises = []; let index = 0;
            sectionKeys.forEach(key => {
                if (enabledSections[key]) {
                    const pool = getFilteredPool(key);
                    currentResults[key].forEach((item, i) => {
                        const card = container.children[index];
                        if (card) {
                            const valueNode = card.querySelector('.result-value');
                            if (isFullSpin && !lockedState[key][i]) { spinPromises.push(doRouletteSpin(valueNode, pool, item, key)); } 
                            else { valueNode.textContent = key === 'components' ? (item.rule === 'use' ? 'Use ' : 'Without ') + item.name : item.name; }
                        }
                        index++;
                    });
                }
            });
            if (isFullSpin) {
                setAllRerollsDisabled(true);
                await Promise.all(spinPromises);
                setAllRerollsDisabled(false);
            }
        }

        async function rerollSingleCard(cardElement, key, subIndex) {
            if (lockedState[key][subIndex]) return;
            const pool = getFilteredPool(key); if (pool.length === 0) return;
            const pickedName = getRandomItemWithoutDupes(pool, currentResults[key]);
            if (pickedName === null) return;
            const newItem = { name: pickedName };
            if (key === 'components') newItem.rule = Math.random() < 0.5 ? 'use' : 'without';
            currentResults[key][subIndex] = newItem;
          
            setAllRerollsDisabled(true);
            document.getElementById('spinBtn').disabled = true;
            await doRouletteSpin(cardElement.querySelector('.result-value'), pool, newItem, key);

        function generatePromptSentence() {
            const promptBox = document.getElementById('promptBox'); const finalPrompt = document.getElementById('finalPrompt');
            if ((!enabledSections.themes && !enabledSections.mechanics && !enabledSections.components) || !sectionKeys.some(k => enabledSections[k] && currentResults[k].length > 0)) { promptBox.style.display = 'none'; return; }

            let sentenceParts = [];
            if (enabledSections.themes && currentResults.themes.length > 0) {
                let list = currentResults.themes.map(t => `<span class="highlight">${t.name}</span>`);
                sentenceParts.push(`about ${list.length === 1 ? list[0] : list.length === 2 ? `${list[0]} and ${list[1]}` : `${list.slice(0, -1).join(", ")}, and ${list[list.length - 1]}`}`);
            }
            if (enabledSections.mechanics && currentResults.mechanics.length > 0) {
                let list = currentResults.mechanics.map(m => `<span class="highlight">${m.name}</span>`);
                sentenceParts.push(`featuring ${list.length === 1 ? list[0] : list.length === 2 ? `${list[0]} and ${list[1]}` : `${list.slice(0, -1).join(", ")}, and ${list[list.length - 1]}`} ${currentResults.mechanics.length === 1 ? "mechanic" : "mechanics"}`);
            }
            if (enabledSections.components && currentResults.components.length > 0) {
                let list = currentResults.components.map(c => `${c.rule === 'use' ? 'using' : 'without'} <span class="highlight">${c.name}</span>`);
                sentenceParts.push(list.length === 1 ? list[0] : list.length === 2 ? `${list[0]} and ${list[1]}` : `${list.slice(0, -1).join(", ")}, and ${list[list.length - 1]}`);
            }

            let finalOutput = "";
            if (sentenceParts.length === 1) finalOutput = `Design a game ${sentenceParts[0]}.`;
            else if (sentenceParts.length === 2) finalOutput = `Design a game ${sentenceParts[0]} ${sentenceParts[1]}.`;
            else if (sentenceParts.length === 3) finalOutput = `Design a game ${sentenceParts[0]} ${sentenceParts[1]}, while ${sentenceParts[2]}.`;
            finalPrompt.innerHTML = finalOutput.charAt(0).toUpperCase() + finalOutput.slice(1);

            if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(text).then(showCopied).catch(() => fallbackCopy(text, showCopied)); }

        function seededRandom(seed) {
            let s = seed;
            return function () { s = (s * 9301 + 49297) % 233280; return s / 233280; };
        }

        function buildWallpaperSVG(styleObj, isLight) {
            const neutralColor = isLight ? '#2b2620' : '#cfcfcf';
            const redColor    = isLight ? '#d9483a' : '#ff6b6b';
            const blueColor   = isLight ? '#3a7bbf' : '#4dadf7';
            const purpleColor = isLight ? '#8a6fc9' : '#a78bfa';
            const accentPalette = [redColor, blueColor, purpleColor];

            const neutralOpacity = isLight ? 0.26 : 0.24;
            const accentOpacity  = isLight ? 0.34 : 0.34;

        
            const rand = seededRandom(hashString(styleObj.label));

            const layout    = styleObj.layout;
            const glyphPool = styleObj.glyphs || [];
            const colorMode = styleObj.colorMode;
            const glyphKey  = styleObj.glyphKey || ''; 

           
            const shuffled = [...accentPalette];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(rand() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            let palette;
            if      (colorMode === 'neutral') palette = [neutralColor];
            else if (colorMode === 'single')  palette = [shuffled[0]];
            else if (colorMode === 'two')     palette = [shuffled[0], shuffled[1]];
            else                              palette = [...accentPalette]; // 'three'

            function pickColor() {
                return palette[Math.floor(rand() * palette.length)];
            }
            function opacity(color) {
                return color === neutralColor ? neutralOpacity : accentOpacity;
            }
            function textNode(x, y, size, color, glyph, rotation) {
                const op = opacity(color).toFixed(2);
                const tx = x.toFixed(1), ty = y.toFixed(1);
                const rot = rotation ? ` transform='rotate(${rotation} ${tx} ${ty})'` : '';
                return `<text x='${tx}' y='${ty}' font-size='${size}' fill='${color}' opacity='${op}' ` +
                       `font-family='sans-serif' text-anchor='middle' dominant-baseline='middle'${rot}>${glyph}</text>`;
            }

            const cells = [];
            let tileW, tileH;

            
            if (layout === 'scatter') {
                const cols = 4, rows = 5;
                const cellW = 240, cellH = 220;
                tileW = cols * cellW; tileH = rows * cellH;

                
                const isSmallGlyph = (glyphKey === 'blocks' || glyphKey === 'cards');

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (rand() < 0.28) continue; 
                        const glyph    = glyphPool[Math.floor(rand() * glyphPool.length)];
                        const color    = pickColor();
                        const baseSize = isSmallGlyph
                            ? Math.round(55 + rand() * 30)
                            : Math.round(88 + rand() * 52);
                        const rotation = Math.round((rand() - 0.5) * 50);
      
                        const margin = Math.ceil(baseSize * 0.65);
                        const cellCx = c * cellW + cellW / 2;
                        const cellCy = r * cellH + cellH / 2;
                        const maxJitterX = Math.max(0, cellW / 2 - margin);
                        const maxJitterY = Math.max(0, cellH / 2 - margin);
                        const cx = Math.min(Math.max(cellCx + (rand() - 0.5) * 2 * maxJitterX, margin), tileW - margin);
                        const cy = Math.min(Math.max(cellCy + (rand() - 0.5) * 2 * maxJitterY, margin), tileH - margin);
                        cells.push(textNode(cx, cy, baseSize, color, glyph, rotation));
                    }
                }

         
            } else if (layout === 'boxes') {
                const cellW = styleObj.cellSize || 60;
                const cellH = styleObj.cellSize || 60;
                const cols = 12, rows = 10;
                tileW = cols * cellW; tileH = rows * cellH;

                const boxStyle  = styleObj.boxStyle  || 'thin';
                const fillCells = styleObj.fillCells !== false; 

          
                const lineColor   = (colorMode === 'neutral') ? neutralColor : pickColor();
                const lineOpacity = (lineColor === neutralColor ? neutralOpacity : accentOpacity);

               
                const weights = {
                    thin:    { outer: 1.2, inner: 0.7 },
                    thick:   { outer: 3.5, inner: 2.0 },
                    double:  { outer: 1.0, inner: 1.0 },
                    mixed:   { outer: 2.5, inner: 1.0 },
                    rounded: { outer: 1.5, inner: 0.8 },
                };
                const w = weights[boxStyle] || weights.thin;

 
                const merged = new Set();
                const boxes  = [];  

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (merged.has(`${r},${c}`)) continue;
                  
                        const spanW = (c + 1 < cols && !merged.has(`${r},${c+1}`) && rand() < 0.25) ? 2 : 1;
                        const spanH = (r + 1 < rows && !merged.has(`${r+1},${c}`) && rand() < 0.20) ? 2 : 1;
          
                        for (let dr = 0; dr < spanH; dr++)
                            for (let dc = 0; dc < spanW; dc++)
                                merged.add(`${r+dr},${c+dc}`);
                        boxes.push({ r, c, bw: spanW, bh: spanH });
                    }
                }

                const lo = lineOpacity.toFixed(2);
                const fillOpacity = (lineOpacity * 0.12).toFixed(3);

                boxes.forEach(({ r, c, bw, bh }) => {
                    const x  = c * cellW,      y  = r * cellH;
                    const x2 = x + bw * cellW, y2 = y + bh * cellH;

     
                    if (fillCells && rand() < 0.40) {
                        const fc = (colorMode === 'neutral') ? neutralColor : pickColor();
                        cells.push(`<rect x='${x}' y='${y}' width='${bw*cellW}' height='${bh*cellH}' fill='${fc}' opacity='${fillOpacity}'/>`);
                    }

                    if (boxStyle === 'double') {
 
                        const gap = 4;
                        cells.push(`<rect x='${x+0.5}' y='${y+0.5}' width='${bw*cellW-1}' height='${bh*cellH-1}' fill='none' stroke='${lineColor}' stroke-width='${w.outer}' opacity='${lo}'/>`);
                        cells.push(`<rect x='${x+gap+0.5}' y='${y+gap+0.5}' width='${bw*cellW-gap*2-1}' height='${bh*cellH-gap*2-1}' fill='none' stroke='${lineColor}' stroke-width='${w.inner}' opacity='${lo}'/>`);
                    } else if (boxStyle === 'rounded') {
                        const rx = Math.min(10, cellW * 0.25);
                        cells.push(`<rect x='${x+1}' y='${y+1}' width='${bw*cellW-2}' height='${bh*cellH-2}' rx='${rx}' ry='${rx}' fill='none' stroke='${lineColor}' stroke-width='${w.outer}' opacity='${lo}'/>`);
                    } else {
     
                        const sw = (boxStyle === 'mixed' && rand() < 0.4) ? w.inner : w.outer;
                        cells.push(`<rect x='${x+0.5}' y='${y+0.5}' width='${bw*cellW-1}' height='${bh*cellH-1}' fill='none' stroke='${lineColor}' stroke-width='${sw}' opacity='${lo}'/>`);
                    }
                });


            } else if (layout === 'lined') {
                const lineDir   = styleObj.lineDir   || 'h';
                const lineStyle = styleObj.lineStyle  || 'thin'; 
                tileW = 200; tileH = 200;

                const lineColor   = (colorMode === 'neutral') ? neutralColor : pickColor();
                const lineOpacity = (lineColor === neutralColor ? neutralOpacity : accentOpacity);
                const lo = lineOpacity.toFixed(2);

                const gap = styleObj.gap || 28;
                const sw  = lineStyle === 'thick' ? 3 : lineStyle === 'double' ? 1.2 : 1;
                const dash = lineStyle === 'dashed' ? `stroke-dasharray='8 6'` : '';

                const addLine = (x1, y1, x2, y2, strokeW) => {
                    cells.push(`<line x1='${x1}' y1='${y1}' x2='${x2}' y2='${y2}' stroke='${lineColor}' stroke-width='${strokeW}' opacity='${lo}' ${dash}/>`);
                };

                if (lineDir === 'h' || lineDir === 'cross') {
                    for (let y = 0; y <= tileH; y += gap) {
                        addLine(0, y, tileW, y, sw);
                        if (lineStyle === 'double') addLine(0, y + 4, tileW, y + 4, sw * 0.7);
                    }
                }
                if (lineDir === 'v' || lineDir === 'cross') {
                    for (let x = 0; x <= tileW; x += gap) {
                        addLine(x, 0, x, tileH, sw);
                        if (lineStyle === 'double') addLine(x + 4, 0, x + 4, tileH, sw * 0.7);
                    }
                }
                if (lineDir === 'diag' || lineDir === 'diagcross') {
                    const step = gap;
                    for (let i = -tileH; i <= tileW + tileH; i += step) {
                        addLine(i, 0, i + tileH, tileH, sw);
                        if (lineStyle === 'double') addLine(i + 4, 0, i + 4 + tileH, tileH, sw * 0.7);
                    }
                }
                if (lineDir === 'diagcross') {
                    for (let i = -tileH; i <= tileW + tileH; i += gap) {
                        addLine(i + tileH, 0, i, tileH, sw);
                    }
                }

            } else if (layout === 'grid') {
                const cols = 6, rows = 6;
                const cellW = 140, cellH = 140;
                tileW = cols * cellW; tileH = rows * cellH;
                const baseSize = 68;

                for (let r = 0; r < rows; r++) {
                    const isStaggered = (r % 2 !== 0);
                    const itemsInRow = isStaggered ? cols + 1 : cols;
                    let firstGlyph, firstColor;

                    for (let c = 0; c < itemsInRow; c++) {
                        let glyph, color;

                        if (isStaggered && c === cols) {

                            glyph = firstGlyph;
                            color = firstColor;
                        } else {
                            glyph = glyphPool[Math.floor(rand() * glyphPool.length)];
                            color = pickColor();
                            if (c === 0) { firstGlyph = glyph; firstColor = color; }
                        }

                        const cx = isStaggered
                            ? c * cellW               
                            : c * cellW + cellW / 2;  
                        const cy = r * cellH + cellH / 2;
                        cells.push(textNode(cx, cy, baseSize, color, glyph, 0));
                    }
                }


            } else if (layout === 'fill') {
                const cols = 10, rows = 10;
                const cellW = 58, cellH = 58;
                tileW = cols * cellW; tileH = rows * cellH;
                const baseSize = 44;
                const fillOpacity = isLight ? 0.13 : 0.10;

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const glyph = glyphPool[Math.floor(rand() * glyphPool.length)];
                        const color = pickColor();
                        const cx = c * cellW + cellW / 2;
                        const cy = r * cellH + cellH / 2;
                        const op = (color === neutralColor ? fillOpacity * 0.85 : fillOpacity).toFixed(2);
                        cells.push(`<text x='${cx.toFixed(1)}' y='${cy.toFixed(1)}' font-size='${baseSize}' fill='${color}' opacity='${op}' ` +
                                   `font-family='sans-serif' text-anchor='middle' dominant-baseline='middle'>${glyph}</text>`);
                    }
                }

            // ── DIAGONAL 45° (rotated grid, seamlessly tiling) ────────────────────
            // Strategy: lay a normal grid in a big buffer, wrap in rotate(45), then
            // crop to a square tile whose side = step*√2. Adjacent tiles share the same
            // diagonal rhythm, giving a seamless diamond pattern.
            } else if (layout === 'diagonal45') {
                const step = 110;                        // spacing between dice centers
                const tileSize = Math.round(step * Math.SQRT2); // ≈155 — the repeat unit at 45°
                tileW = tileSize; tileH = tileSize;

                // We need to fill a rotated square that is tileSize wide.
                // After rotating 45°, the bounding box of a tileSize×tileSize square
                // is tileSize*√2 wide — so we generate a grid large enough to cover that,
                // centered on the tile center, then rotate.
                const cx0 = tileSize / 2, cy0 = tileSize / 2;
                const cover = Math.ceil(tileSize * Math.SQRT2 / 2) + step;
                const startI = Math.floor(-cover / step);
                const endI   = Math.ceil( cover / step);

                const gridItems = [];
                for (let r = startI; r <= endI; r++) {
                    for (let c = startI; c <= endI; c++) {
                        const glyph = glyphPool[Math.floor(rand() * glyphPool.length)];
                        const color = pickColor();
                        const x = cx0 + c * step;
                        const y = cy0 + r * step;
                        const op = opacity(color).toFixed(2);
                        gridItems.push(
                            `<text x='${x.toFixed(1)}' y='${y.toFixed(1)}' font-size='${styleObj.size || 62}' fill='${color}' opacity='${op}' ` +
                            `font-family='sans-serif' text-anchor='middle' dominant-baseline='middle'>${glyph}</text>`
                        );
                    }
                }

                // Wrap the whole grid in a single 45° rotation around the tile center
                cells.push(
                    `<g transform='rotate(45 ${cx0.toFixed(1)} ${cy0.toFixed(1)})'>${gridItems.join('')}</g>`
                );

            } else {
                // Fallback
                tileW = 100; tileH = 100;
            }

            const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='${tileW}' height='${tileH}'>` +
                        cells.join('') +
                        `</svg>`;
            return { uri: `data:image/svg+xml,${encodeSvgForUrl(svg)}`, width: tileW, height: tileH };
        }

        function encodeSvgForUrl(svgString) {
            return encodeURIComponent(svgString).replace(/'/g, '%27').replace(/\(/g, '%28').replace(/\)/g, '%29');
        }

        function initWallpaperSystem() {
            const layer = document.getElementById('wallpaperLayer');
            const btn = document.getElementById('wallpaperStyleBtn');
            const ring = document.getElementById('wallpaperProgressRing');
            const ringCircle = ring.querySelector('circle');
            const LONG_PRESS_MS = 600;
            const RING_CIRCUMFERENCE = 138.23; // 2π × 22

            window.refreshWallpaper = function () {
                const styleObj = WALLPAPER_STYLES[wallpaperStyleIndex];
                if (styleObj.layout === 'none') {
                    layer.classList.remove('visible');
                } else {
                    const isLight = document.body.classList.contains('light-mode');
                    const tile = buildWallpaperSVG(styleObj, isLight);
                    layer.style.backgroundImage = `url('${tile.uri}')`;
                    layer.style.backgroundSize = `${tile.width}px ${tile.height}px`;
                    layer.classList.add('visible');
                }
                // Tooltip shows current style
                btn.title = `Background: ${WALLPAPER_STYLES[wallpaperStyleIndex].label} — click to cycle, hold to turn off`;
                btn.setAttribute('aria-label', `Background style: ${WALLPAPER_STYLES[wallpaperStyleIndex].label}. Click to cycle, hold to turn off.`);
            };

            // Long-press state
            let pressTimer = null;
            let pressStartTime = null;
            let rafId = null;
            let didLongPress = false;

            function startPress(e) {
                // Ignore right-click
                if (e.button !== undefined && e.button !== 0) return;
                didLongPress = false;
                pressStartTime = Date.now();
                ring.classList.add('active');

                function updateRing() {
                    const elapsed = Date.now() - pressStartTime;
                    const progress = Math.min(elapsed / LONG_PRESS_MS, 1);
                    const offset = RING_CIRCUMFERENCE * (1 - progress);
                    ringCircle.style.strokeDashoffset = offset;
                    if (progress < 1) {
                        rafId = requestAnimationFrame(updateRing);
                    }
                }
                rafId = requestAnimationFrame(updateRing);

                pressTimer = setTimeout(() => {
                    didLongPress = true;
                    cancelAnimationFrame(rafId);
                    ringCircle.style.strokeDashoffset = 0;
                    // Turn wallpaper off
                    wallpaperStyleIndex = 0; // 'Off' is index 0
                    window.refreshWallpaper();
                    btn.classList.add('long-pressing');
                    setTimeout(() => btn.classList.remove('long-pressing'), 300);
                    endPress();
                }, LONG_PRESS_MS);
            }

            function endPress() {
                clearTimeout(pressTimer);
                cancelAnimationFrame(rafId);
                pressTimer = null;
                pressStartTime = null;
                // Animate ring back to empty
                ringCircle.style.transition = 'stroke-dashoffset 0.2s ease';
                ringCircle.style.strokeDashoffset = RING_CIRCUMFERENCE;
                setTimeout(() => {
                    ring.classList.remove('active');
                    ringCircle.style.transition = 'stroke-dashoffset 0.05s linear';
                }, 220);
            }

            btn.addEventListener('mousedown', startPress);
            btn.addEventListener('touchstart', e => { e.preventDefault(); startPress(e.touches[0]); }, { passive: false });

            btn.addEventListener('mouseup', endPress);
            btn.addEventListener('mouseleave', endPress);
            btn.addEventListener('touchend', endPress);
            btn.addEventListener('touchcancel', endPress);

            btn.addEventListener('click', (e) => {
                if (didLongPress) { didLongPress = false; return; } // swallow click after long press
                wallpaperStyleIndex = (wallpaperStyleIndex + 1) % WALLPAPER_STYLES.length;
                window.refreshWallpaper();
            });

            // Set initial tooltip
            window.refreshWallpaper();
        }
    </script>
</body>
</html>
